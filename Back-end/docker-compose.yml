services:
  db:
    build: 
      context: ./docker/docker_db
      dockerfile: dockerfile
    container_name: turtle_db_container
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # Volume này giúp dữ liệu được lưu lại sau khi tắt container
      - postgres_data:/var/lib/postgresql/data
    restart: no

  web:
    build:
      # Context đặt ở '.' (thư mục Back-end/) để Dockerfile thấy pyproject.toml
      context: .
      dockerfile: docker/docker_env/dockerfile
    container_name: turtle_web_container
    # command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
